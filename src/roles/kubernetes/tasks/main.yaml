---
- name: "System | Checking for Distribution Config: {{ ansible_facts.distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts.distribution }}.yaml"
  register: system_distribution_config
  no_log: true

- name: "System | Run Tasks: {{ ansible_facts.distribution }}"
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution }}.yaml"
  when: system_distribution_config.stat.exists
  no_log: true

- name: "K3D | Check if installed"
  ansible.builtin.stat:
    path: "/usr/local/bin/k3d"
  register: k3d_bin

- name: "K3D | Install"
  ansible.builtin.shell: "wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash"
  when: not k3d_bin.stat.exists

- name: "K9S | Refresh {{ ansible_facts.user_dir }}/.config/k9s folder"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/k9s"
    state: absent

- name: "K9s | Ensure k9s directory structure exists"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
    state: directory
  loop:
    - "{{ ansible_facts.user_dir }}/.config"
    - "{{ ansible_facts.user_dir }}/.config/k9s"

- name: "K9s | Link k9s config files"
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_facts.user_dir }}/.config/k9s"
    state: link
    force: yes
