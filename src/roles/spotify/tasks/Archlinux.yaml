---
# Omarchy already ships spotify — skip it, cava isn't included so install it anywhere.
- name: "SPOTIFY | Install packages already in Omarchy"
  become: true
  community.general.pacman:
    name: spotify
    state: present
  when: not (omarchy_mode | default(false))

- name: "SPOTIFY | Install remaining packages"
  become: true
  community.general.pacman:
    name: cava
    state: present

- name: "SPOTIFY | Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/spotify"
    mode: "0755"
    state: directory

- name: "SPOTIFY | Fix Wayland issue"
  ansible.builtin.copy:
    src: "{{ role_path }}/files/spotify-launcher.conf"
    dest: "{{ ansible_facts.user_dir }}/.config/spotify"
    mode: '0755'
    remote_src: true
    force: true

