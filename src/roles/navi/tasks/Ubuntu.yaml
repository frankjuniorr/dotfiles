---
- name: "NAVI | Get latest version"
  ansible.builtin.uri:
    url: https://api.github.com/repos/denisidoro/navi/releases/latest
    return_content: yes
  register: navi_release_info

- name: "NAVI | Extract version"
  ansible.builtin.set_fact:
    navi_version: "{{ navi_release_info.json.tag_name }}"

- name: "NAVI | Download binary"
  ansible.builtin.get_url:
    url: "https://github.com/denisidoro/navi/releases/download/{{ navi_version }}/navi-{{ navi_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: /tmp/navi.tar.gz
    force: true

- name: "NAVI | Extract binary"
  ansible.builtin.unarchive:
    src: /tmp/navi.tar.gz
    dest: /tmp
    remote_src: yes

- name: "NAVI | Install binary"
  become: true
  ansible.builtin.copy:
    src: /tmp/navi
    dest: /usr/local/bin/navi
    mode: '0755'
    force: true

- name: "NAVI | Cleanup"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/navi.tar.gz
    - /tmp/navi
