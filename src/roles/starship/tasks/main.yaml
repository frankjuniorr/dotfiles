---
- name: "System | Checking for Distribution Config: {{ ansible_facts.distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts.distribution }}.yaml"
  register: system_distribution_config
  no_log: true

- name: "System | Run Tasks: {{ ansible_facts.distribution }}"
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution }}.yaml"
  when: system_distribution_config.stat.exists
  no_log: true


- name: "STARSHIP | Refresh {{ ansible_facts.user_dir }}/.config/starship folder"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/starship"
    state: absent

# Link the Config File
- name: "STARSHIP | Ensure starship directory structure exists"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
    state: directory
  loop:
    - "{{ ansible_facts.user_dir }}/.config"
    - "{{ ansible_facts.user_dir }}/.config/starship"

- name: "STARSHIP | Copy config file"
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_facts.user_dir }}/.config/starship"
    state: link
    force: yes
