
# WINDOWS
############################################################
# Shift + arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# <prefix> + < / > to swap window left/right
bind-key -r < swap-window -t -1
bind-key -r > swap-window -t +1

# C-w kills window without confirmation prompt
bind-key -n C-w kill-window

# Start numbering at 1, renumber on close
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

bind r command-prompt "rename-window %%"


# PANES
############################################################
# | and - split in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# <prefix> + arrow to resize panes
bind -r -T prefix Up    resize-pane -U 10
bind -r -T prefix Down  resize-pane -D 10
bind -r -T prefix Left  resize-pane -L 20
bind -r -T prefix Right resize-pane -R 20

# Alt + arrow to move between panes (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# x kills pane without confirmation prompt
bind-key x kill-pane

# y toggles synchronized input to all panes
bind-key y set-window-option synchronize-panes\; display-message "synchronize mode toggled."
